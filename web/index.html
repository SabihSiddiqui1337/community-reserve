<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Amenry - community amenity reservations">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="amenry">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>amenry</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* The Firebase Auth-emulator warning is a fixed bar pinned to the bottom of
       the window; it covers the app's bottom navigation. Hide it for the demo.
       (Remove when pointing at a real backend.) */
    .firebase-emulator-warning { display: none !important; }
    /* Ensure the Flutter view fills the window exactly (no stray scroll). */
    html, body { height: 100%; margin: 0; overflow: hidden; }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <!--
    DEMO/EMULATOR FIX: Firebase Auth persists the session in an IndexedDB
    ("firebaseLocalStorageDb"). On reload the SDK restores it and fires a
    network call that can race the Auth-emulator binding, sending auth to
    production ("something went wrong"). Clearing it before Flutter boots makes
    emulator login deterministic. (Trade-off: you log in each visit — instant
    via the demo chips.) Remove this block when pointing at a real backend.
  -->
  <script>
    (function () {
      var booted = false;
      function boot() {
        if (booted) return;
        booted = true;
        var s = document.createElement('script');
        s.src = 'flutter_bootstrap.js';
        s.async = true;
        document.body.appendChild(s);
      }
      // Remove any old Flutter service worker so fresh builds always load.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then(function (rs) { rs.forEach(function (r) { r.unregister(); }); })
          .catch(function () {});
      }
      try {
        var req = indexedDB.deleteDatabase('firebaseLocalStorageDb');
        req.onsuccess = boot;
        req.onerror = boot;
        req.onblocked = boot;
        setTimeout(boot, 600); // safety net
      } catch (e) {
        boot();
      }
    })();
  </script>
  <!--
    DEBUG ONLY: force Flutter to re-measure the window after boot so the app
    always fits the current viewport on first load (otherwise the bottom nav can
    sit just below the fold until the first manual window resize). Fires a few
    synthetic resize events. REMOVE this block for the production app build.
  -->
  <script>
    (function () {
      function nudge() {
        try { window.dispatchEvent(new Event('resize')); } catch (e) {}
      }
      [400, 1000, 2000, 3500, 5000].forEach(function (t) {
        setTimeout(nudge, t);
      });
      window.addEventListener('load', function () { setTimeout(nudge, 200); });
    })();
  </script>
</body>
</html>
