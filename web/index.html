<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- viewport-fit=cover lets the app use the full screen incl. safe areas, and
       is required for the bottom nav to reach the true bottom on mobile. -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Amenry - community amenity reservations">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="amenry">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>amenry</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* The Firebase Auth-emulator warning is a fixed bar pinned to the bottom of
       the window; it covers the app's bottom navigation. Hide it for the demo.
       (Remove when pointing at a real backend.) */
    .firebase-emulator-warning { display: none !important; }
    /* Ensure the Flutter view fills the window exactly (no stray scroll).
       100dvh = the DYNAMIC viewport height: it tracks mobile-browser chrome
       (the URL bar collapsing on scroll), so the bottom nav always sits on the
       true bottom. 100vh is the fallback for browsers without dvh support. */
    html, body { margin: 0; overflow: hidden; height: 100vh; height: 100dvh; }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <!--
    DEMO/EMULATOR FIX: Firebase Auth persists the session in an IndexedDB
    ("firebaseLocalStorageDb"). On reload the SDK restores it and fires a
    network call that can race the Auth-emulator binding, sending auth to
    production ("something went wrong"). Clearing it before Flutter boots makes
    emulator login deterministic. (Trade-off: you log in each visit — instant
    via the demo chips.) Remove this block when pointing at a real backend.
  -->
  <script>
    (function () {
      // The emulator-only hacks below must NEVER run in production, or the user
      // gets logged out on every visit. Gate them on a localhost host.
      var isLocal = location.hostname === '127.0.0.1'
        || location.hostname === 'localhost';
      var booted = false;
      function boot() {
        if (booted) return;
        booted = true;
        var s = document.createElement('script');
        s.src = 'flutter_bootstrap.js';
        s.async = true;
        document.body.appendChild(s);
      }
      if (!isLocal) {
        // PRODUCTION: keep the Firebase auth session (stay signed in) and boot.
        boot();
        return;
      }
      // DEV/EMULATOR ONLY: clear any stale service worker so fresh builds load,
      // and wipe the Firebase auth IndexedDB so emulator login is deterministic.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then(function (rs) { rs.forEach(function (r) { r.unregister(); }); })
          .catch(function () {});
      }
      try {
        var req = indexedDB.deleteDatabase('firebaseLocalStorageDb');
        req.onsuccess = boot;
        req.onerror = boot;
        req.onblocked = boot;
        setTimeout(boot, 600); // safety net
      } catch (e) {
        boot();
      }
    })();
  </script>
  <!--
    Keep Flutter's layout in sync with the LIVE viewport. On mobile browsers the
    URL bar / toolbar shows and hides as you scroll, changing the visible height;
    we forward those changes (via the Visual Viewport API) as resize events so
    Flutter re-measures and the bottom nav always tracks the true bottom. The
    timed nudges cover the very first paint before listeners are wired.
  -->
  <script>
    (function () {
      function nudge() {
        try { window.dispatchEvent(new Event('resize')); } catch (e) {}
      }
      var vv = window.visualViewport;
      if (vv) {
        vv.addEventListener('resize', nudge);
        vv.addEventListener('scroll', nudge);
      }
      window.addEventListener('orientationchange', function () {
        setTimeout(nudge, 100);
      });
      window.addEventListener('load', function () { setTimeout(nudge, 200); });
      [300, 1000, 2500].forEach(function (t) { setTimeout(nudge, t); });
    })();
  </script>
</body>
</html>
