name: Deploy to Firebase Hosting (live)

# Auto-deploy the web app to https://amenry-prod.web.app on every push to `main`.
# Until the repo secret FIREBASE_SERVICE_ACCOUNT_AMENRY_PROD exists (created by
# `firebase init hosting:github`), the deploy job is SKIPPED (so pushes don't
# show a failed run) — it activates automatically once the secret is added.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AMENRY_PROD }}
        run: |
          if [ -n "$SA" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy key not set yet — skipping deploy. Run 'firebase init hosting:github' to enable auto-deploy."
          fi

  deploy:
    needs: gate
    if: needs.gate.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate freezed / json
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web (production backend)
        run: flutter build web --release --pwa-strategy=none --dart-define=USE_EMULATORS=false

      - name: Re-apply kill-switch service worker
        run: cp web/flutter_service_worker.js build/web/flutter_service_worker.js

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AMENRY_PROD }}
          projectId: amenry-prod
          channelId: live
