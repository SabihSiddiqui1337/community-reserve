name: Deploy to Firebase Hosting (live)

# Auto-deploy the web app to https://amenry-prod.web.app on every push to `main`.
# Needs repo secret FIREBASE_SERVICE_ACCOUNT_AMENRY_PROD (created by
# `firebase init hosting:github` — see GO-LIVE.md).
on:
  push:
    branches: [main]
  workflow_dispatch: {}        # lets you trigger a deploy manually from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate freezed / json
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web (production backend)
        run: flutter build web --release --pwa-strategy=none --dart-define=USE_EMULATORS=false

      - name: Re-apply kill-switch service worker
        run: cp web/flutter_service_worker.js build/web/flutter_service_worker.js

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AMENRY_PROD }}
          projectId: amenry-prod
          channelId: live
